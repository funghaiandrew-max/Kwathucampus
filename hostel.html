<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hostel Details - Kwathu</title>
<style>
:root{--primary:#1e3a8a;--accent:#0d9488;--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--dark:#111827}
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
body.loading *{visibility:hidden}
.container{max-width:700px;margin:0 auto;padding:16px;width:100%;flex:1}
.header{padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.back{font-size:14px;color:var(--primary);text-decoration:none;font-weight:600}
.gallery{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.gallery img{width:100%;height:300px;object-fit:cover;border-radius:16px;flex-shrink:0}
.thumbs{display:flex;gap:8px;margin-top:8px}
.thumbs img{width:80px;height:80px;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid transparent}
.thumbs img.active{border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:16px}
.title{font-size:24px;font-weight:800;margin-bottom:4px}
.muted{color:var(--muted);font-size:14px;margin-bottom:12px}
.price{font-size:22px;font-weight:800;color:var(--accent);margin:12px 0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0}
.item{background:var(--bg);padding:12px;border-radius:12px;font-size:13px}
.label{color:var(--muted);font-size:11px;margin-bottom:4px}
.value{font-weight:700}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.btn{padding:14px;border:0;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;text-align:center;text-decoration:none}
.btn-wa{background:#25D366;color:#fff}
.btn-call{background:var(--primary);color:#fff}
.like-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.like-btn{background:var(--dark);color:#fff;border:0;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.like-btn.liked{background:var(--accent)}
</style>
</head>
<body class="loading">
<div class="container">
  <header class="header"><a href="browse.html" class="back">← Back to Browse</a></header>
  <div id="content"><div style="text-align:center;padding:60px;color:var(--muted)">Loading...</div></div>
</div>

<script type="module">
import { Client, Account, Databases, ID, Query } from 'https://cdn.jsdelivr.net/npm/appwrite@14.0.1/+esm'

const ENDPOINT = 'https://fra.cloud.appwrite.io/v1';
const PROJECT_ID = 'kwathucampus';
const DATABASE_ID = 'Kwathuhostel';
const HOSTELS_COLLECTION = 'hostels';
const LIKES_COLLECTION = 'hostel_likes';

const client = new Client().setEndpoint(ENDPOINT).setProject(PROJECT_ID);
const account = new Account(client);
const databases = new Databases(client);

const hostelId = new URLSearchParams(location.search).get('id');
let userId = null;
let liked = false;

(async ()=>{
  try{ userId = (await account.get()).$id }catch{ userId = null }
  if(!hostelId){ location='browse.html'; return }
  await render();
  document.body.classList.remove('loading');
})();

async function render(){
  const hostel = await databases.getDocument(DATABASE_ID, HOSTELS_COLLECTION, hostelId);
  const likeRes = await databases.listDocuments(DATABASE_ID, LIKES_COLLECTION, [Query.equal('user_id', userId), Query.equal('hostel_id', hostelId)]);
  liked = likeRes.documents.length>0;

  const imgs = hostel.images?.length?hostel.images:['https://placehold.co/600x400/e2e8f0/64748b?text=No+Pic'];
  document.getElementById('content').innerHTML = `
    <div class="gallery" id="mainImg"><img src="${imgs[0]}"></div>
    ${imgs.length>1?`<div class="thumbs">${imgs.map((u,i)=>`<img src="${u}" class="${i===0?'active':''}" onclick="setMain('${u}', this)">`).join('')}</div>`:''}

    <div class="card">
      <div class="title">${hostel.name}</div>
      <div class="muted">${hostel.location}, ${hostel.university}</div>
      <div class="price">MK ${Number(hostel.price).toLocaleString()}/month</div>

      <div class="grid">
        <div class="item"><div class="label">Room Type</div><div class="value">${hostel.room_type}</div></div>
        <div class="item"><div class="label">Status</div><div class="value">${hostel.status}</div></div>
        <div class="item"><div class="label">Landlord</div><div class="value">${hostel.landlord_name||'Kwathu'}</div></div>
        <div class="item"><div class="label">Likes</div><div class="value" id="likeCount">${hostel.likes_count||0} Students</div></div>
      </div>

      <div class="like-row">
        <button class="like-btn ${liked?'liked':''}" id="likeBtn" onclick="toggleLike()">❤️ ${liked?'Liked':'Like'}</button>
      </div>

      <div class="actions">
        <a class="btn btn-wa" href="https://wa.me/${(hostel.landlord_phone||'').replace(/\D/g,'')}?text=Hi ${hostel.landlord_name||''}, I'm interested in ${hostel.name}" target="_blank">📱 WhatsApp</a>
        <a class="btn btn-call" href="tel:${hostel.landlord_phone||''}">📞 Call</a>
      </div>
    </div>`;
}

window.setMain=(src, el)=>{
  document.querySelector('#mainImg img').src=src;
  document.querySelectorAll('.thumbs img').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

window.toggleLike=async()=>{
  if(!userId){alert('Login to like'); location='landlord-auth.html'; return;}
  const btn=document.getElementById('likeBtn');
  const countEl=document.getElementById('likeCount');
  let count=Number(countEl.textContent);

  if(liked){
    const res = await databases.listDocuments(DATABASE_ID, LIKES_COLLECTION, [Query.equal('user_id', userId), Query.equal('hostel_id', hostelId)]);
    await databases.deleteDocument(DATABASE_ID, LIKES_COLLECTION, res.documents[0].$id);
    await databases.updateDocument(DATABASE_ID, HOSTELS_COLLECTION, hostelId, {likes_count: count-1});
    countEl.textContent = `${count-1} Students`;
    btn.textContent='❤️ Like'; btn.classList.remove('liked'); liked=false;
  }else{
    await databases.createDocument(DATABASE_ID, LIKES_COLLECTION, ID.unique(), {user_id: userId, hostel_id: hostelId});
    await databases.updateDocument(DATABASE_ID, HOSTELS_COLLECTION, hostelId, {likes_count: count+1});
    countEl.textContent = `${count+1} Students`;
    btn.textContent='❤️ Liked'; btn.classList.add('liked'); liked=true;
  }
}
</script>
</body>
</html>
